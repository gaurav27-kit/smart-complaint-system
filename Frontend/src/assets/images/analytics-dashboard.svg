<svg viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-opacity="0.06" />
    </filter>
  </defs>

  <rect x="50" y="50" width="600" height="350" rx="20" fill="#ffffff" filter="url(#cardShadow)" />
  
  <!-- Header -->
  <rect x="90" y="90" width="150" height="16" rx="8" fill="#1e293b" />
  <rect x="90" y="120" width="200" height="10" rx="5" fill="#94a3b8" />
  
  <rect x="530" y="90" width="80" height="30" rx="15" fill="#f1f5f9" />
  <rect x="545" y="101" width="50" height="8" rx="4" fill="#64748b" />

  <!-- Chart Background Lines -->
  <rect x="90" y="180" width="520" height="1" fill="#e2e8f0" />
  <rect x="90" y="240" width="520" height="1" fill="#e2e8f0" />
  <rect x="90" y="300" width="520" height="1" fill="#e2e8f0" />
  <rect x="90" y="360" width="520" height="1" fill="#e2e8f0" />

  <!-- Smooth Line Chart -->
  <path d="M 90 320 C 150 300, 200 200, 250 250 C 320 310, 380 180, 450 220 C 520 260, 580 150, 610 130 L 610 360 L 90 360 Z" fill="url(#areaGrad)" />
  <path d="M 90 320 C 150 300, 200 200, 250 250 C 320 310, 380 180, 450 220 C 520 260, 580 150, 610 130" stroke="#4F46E5" stroke-width="4" fill="none" stroke-linecap="round" />
  
  <!-- Data Points -->
  <circle cx="250" cy="250" r="6" fill="#ffffff" stroke="#4F46E5" stroke-width="3" />
  <circle cx="450" cy="220" r="6" fill="#ffffff" stroke="#4F46E5" stroke-width="3" />
  <circle cx="610" cy="130" r="6" fill="#ffffff" stroke="#4F46E5" stroke-width="3" />
  
  <!-- Bar chart overlay -->
  <rect x="130" y="280" width="20" height="80" rx="4" fill="#2563EB" opacity="0.8" />
  <rect x="330" y="220" width="20" height="140" rx="4" fill="#2563EB" opacity="0.8" />
  <rect x="530" y="160" width="20" height="200" rx="4" fill="#2563EB" opacity="0.8" />
</svg>
