<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="floatShadow">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#ctaGrad)" />
  
  <!-- Abstract Shapes Background -->
  <circle cx="100" cy="50" r="150" fill="#ffffff" opacity="0.05" />
  <circle cx="700" cy="350" r="200" fill="#ffffff" opacity="0.05" />
  <path d="M 0 400 L 300 100 L 800 300 L 800 400 Z" fill="#ffffff" opacity="0.03" />

  <!-- Floating UI Cards -->
  <rect x="250" y="80" width="300" height="240" rx="20" fill="#ffffff" filter="url(#floatShadow)" />
  <rect x="290" y="120" width="100" height="100" rx="50" fill="#f1f5f9" />
  <circle cx="340" cy="170" r="25" fill="#2563eb" />
  
  <rect x="420" y="140" width="90" height="16" rx="8" fill="#1e293b" />
  <rect x="420" y="170" width="70" height="10" rx="5" fill="#94a3b8" />
  <rect x="420" y="190" width="50" height="10" rx="5" fill="#94a3b8" />
  
  <rect x="290" y="250" width="220" height="12" rx="6" fill="#e2e8f0" />
  <rect x="290" y="275" width="160" height="12" rx="6" fill="#e2e8f0" />
  
  <!-- Mini overlapping card -->
  <rect x="450" y="200" width="180" height="140" rx="16" fill="#ffffff" filter="url(#floatShadow)" />
  <circle cx="540" cy="250" r="30" fill="#dbeafe" />
  <path d="M 530 250 L 545 265 L 560 235" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <rect x="490" y="300" width="100" height="10" rx="5" fill="#1e293b" />
</svg>
