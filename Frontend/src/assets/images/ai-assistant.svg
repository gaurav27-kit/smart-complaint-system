<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="glowAi" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Abstract AI Core -->
  <circle cx="300" cy="300" r="120" fill="url(#aiGrad)" filter="url(#glowAi)" opacity="0.8" />
  <circle cx="300" cy="300" r="80" fill="#ffffff" opacity="0.1" />
  <circle cx="300" cy="300" r="40" fill="#ffffff" opacity="0.2" />

  <!-- Orbiting Nodes -->
  <path d="M 300 100 A 200 200 0 1 1 299 100" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="10,15" />
  <path d="M 300 150 A 150 150 0 1 1 299 150" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,10" />

  <circle cx="300" cy="100" r="15" fill="#ffffff" filter="url(#glowAi)" />
  <circle cx="300" cy="100" r="6" fill="#4F46E5" />

  <circle cx="126" cy="400" r="20" fill="#ffffff" filter="url(#glowAi)" />
  <circle cx="126" cy="400" r="8" fill="#2563EB" />

  <circle cx="474" cy="400" r="12" fill="#ffffff" filter="url(#glowAi)" />
  <circle cx="474" cy="400" r="4" fill="#38bdf8" />

  <!-- Floating Sparkles -->
  <polygon points="150,150 155,140 160,150 170,155 160,160 155,170 150,160 140,155" fill="#4F46E5" opacity="0.6" />
  <polygon points="450,200 453,190 456,200 466,203 456,206 453,216 450,206 440,203" fill="#2563EB" opacity="0.5" />
  <polygon points="250,450 254,440 258,450 268,454 258,458 254,468 250,458 240,454" fill="#38bdf8" opacity="0.7" />
</svg>
