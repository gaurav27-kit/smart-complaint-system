<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-opacity="0.08" flood-color="#0f172a"/>
    </filter>
  </defs>
  
  <!-- Backdrop Glow -->
  <circle cx="400" cy="300" r="300" fill="url(#primaryGrad)" opacity="0.05" />
  <circle cx="200" cy="150" r="150" fill="#2563EB" opacity="0.08" filter="blur(40px)" />
  <circle cx="600" cy="450" r="200" fill="#4F46E5" opacity="0.08" filter="blur(60px)" />

  <!-- Main Dashboard UI Window -->
  <rect x="150" y="150" width="500" height="320" rx="16" fill="#ffffff" filter="url(#shadow)"/>
  
  <!-- Dashboard Header -->
  <rect x="150" y="150" width="500" height="60" fill="#f8fafc" rx="16"/>
  <rect x="150" y="190" width="500" height="20" fill="#f8fafc" />
  <circle cx="180" cy="180" r="6" fill="#ef4444" />
  <circle cx="200" cy="180" r="6" fill="#eab308" />
  <circle cx="220" cy="180" r="6" fill="#22c55e" />
  <rect x="250" y="174" width="120" height="12" rx="6" fill="#cbd5e1" />
  
  <!-- Sidebar -->
  <rect x="150" y="210" width="120" height="260" fill="#ffffff" />
  <rect x="269" y="210" width="1" height="260" fill="#f1f5f9" />
  <rect x="170" y="230" width="80" height="10" rx="5" fill="#e2e8f0" />
  <rect x="170" y="260" width="60" height="8" rx="4" fill="#f1f5f9" />
  <rect x="170" y="280" width="70" height="8" rx="4" fill="#f1f5f9" />
  <rect x="170" y="300" width="50" height="8" rx="4" fill="#f1f5f9" />

  <!-- Main Content Area -->
  <rect x="290" y="230" width="150" height="10" rx="5" fill="#94a3b8" />
  
  <rect x="290" y="260" width="220" height="60" rx="8" fill="#f8fafc" />
  <rect x="310" y="280" width="120" height="8" rx="4" fill="#cbd5e1" />
  <rect x="310" y="296" width="180" height="6" rx="3" fill="#e2e8f0" />
  <rect x="525" y="278" width="40" height="24" rx="12" fill="#dbeafe" />
  <circle cx="545" cy="290" r="4" fill="#2563EB" />

  <rect x="290" y="330" width="340" height="60" rx="8" fill="#f8fafc" />
  <rect x="310" y="350" width="140" height="8" rx="4" fill="#cbd5e1" />
  <rect x="310" y="366" width="240" height="6" rx="3" fill="#e2e8f0" />
  
  <!-- Floating Ticket / Notification -->
  <rect x="420" y="110" width="280" height="80" rx="12" fill="#ffffff" filter="url(#shadow)" />
  <rect x="440" y="130" width="30" height="30" rx="8" fill="url(#primaryGrad)" />
  <circle cx="455" cy="145" r="6" fill="#ffffff" />
  <rect x="485" y="135" width="120" height="8" rx="4" fill="#1e293b" />
  <rect x="485" y="153" width="180" height="6" rx="3" fill="#94a3b8" />
  <rect x="485" y="165" width="140" height="6" rx="3" fill="#94a3b8" />
</svg>
