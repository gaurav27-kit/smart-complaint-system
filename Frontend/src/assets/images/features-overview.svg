<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowBox">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.05" />
    </filter>
  </defs>
  
  <!-- Background Pattern -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#cbd5e1" />
  </pattern>
  <rect width="800" height="500" fill="url(#dots)" opacity="0.4" />

  <!-- Grid Cells -->
  <rect x="100" y="80" width="280" height="160" rx="16" fill="#ffffff" filter="url(#shadowBox)" />
  <rect x="125" y="105" width="40" height="40" rx="10" fill="#e0e7ff" />
  <circle cx="145" cy="125" r="8" fill="#4f46e5" />
  <rect x="125" y="165" width="160" height="12" rx="6" fill="#1e293b" />
  <rect x="125" y="190" width="220" height="8" rx="4" fill="#94a3b8" />
  <rect x="125" y="210" width="180" height="8" rx="4" fill="#94a3b8" />

  <rect x="420" y="80" width="280" height="340" rx="16" fill="#2563eb" filter="url(#shadowBox)" />
  <rect x="450" y="110" width="40" height="40" rx="10" fill="#ffffff" opacity="0.2" />
  <rect x="450" y="170" width="180" height="14" rx="7" fill="#ffffff" />
  <rect x="450" y="200" width="220" height="10" rx="5" fill="#ffffff" opacity="0.7" />
  <rect x="450" y="220" width="200" height="10" rx="5" fill="#ffffff" opacity="0.7" />
  <rect x="450" y="260" width="220" height="120" rx="12" fill="#ffffff" opacity="0.1" />
  <path d="M 450 350 Q 500 280, 560 330 T 670 280" stroke="#ffffff" stroke-width="4" fill="none" />
  
  <rect x="100" y="260" width="280" height="160" rx="16" fill="#ffffff" filter="url(#shadowBox)" />
  <rect x="125" y="285" width="40" height="40" rx="10" fill="#dbeafe" />
  <rect x="135" y="295" width="20" height="20" rx="4" fill="#2563eb" />
  <rect x="125" y="345" width="140" height="12" rx="6" fill="#1e293b" />
  <rect x="125" y="370" width="230" height="8" rx="4" fill="#94a3b8" />
</svg>
