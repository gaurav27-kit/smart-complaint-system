<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB" />
      <stop offset="100%" style="stop-color:#4F46E5" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff; stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8fafc; stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="pieGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb" />
      <stop offset="100%" style="stop-color:#38bdf8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="25" stdDeviation="30" flood-opacity="0.1" flood-color="#0f172a" />
    </filter>
    <filter id="floatShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-opacity="0.15" flood-color="#0f172a" />
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="80" />
    </filter>
  </defs>

  <!-- Ambient background glow -->
  <circle cx="600" cy="400" r="350" fill="#2563eb" opacity="0.04" filter="url(#blur)" />

  <!-- Laptop Base -->
  <rect x="150" y="700" width="900" height="24" rx="12" fill="#cbd5e1" filter="url(#shadow)" />
  <rect x="450" y="700" width="300" height="12" rx="4" fill="#94a3b8" opacity="0.4" />

  <!-- Laptop Screen Outer Frame -->
  <rect x="200" y="150" width="800" height="520" rx="20" fill="#1e293b" filter="url(#shadow)" />
  <rect x="210" y="160" width="780" height="490" rx="10" fill="#f1f5f9" />
  
  <!-- Sidebar -->
  <rect x="210" y="160" width="180" height="490" fill="#ffffff" />
  <rect x="389" y="160" width="1" height="490" fill="#e2e8f0" />
  
  <!-- Logo area -->
  <rect x="240" y="190" width="30" height="30" rx="8" fill="url(#bgGrad)" />
  <rect x="285" y="200" width="60" height="10" rx="5" fill="#1e293b" />
  
  <!-- Nav Items -->
  <rect x="230" y="250" width="140" height="36" rx="8" fill="#eff6ff" />
  <rect x="245" y="262" width="12" height="12" rx="3" fill="#2563eb" />
  <rect x="270" y="264" width="70" height="8" rx="4" fill="#2563eb" />

  <rect x="245" y="312" width="12" height="12" rx="3" fill="#94a3b8" />
  <rect x="270" y="314" width="80" height="8" rx="4" fill="#64748b" />
  
  <rect x="245" y="352" width="12" height="12" rx="3" fill="#94a3b8" />
  <rect x="270" y="354" width="60" height="8" rx="4" fill="#64748b" />

  <!-- Top Nav Bar -->
  <rect x="390" y="160" width="600" height="60" fill="#ffffff" />
  <rect x="390" y="219" width="600" height="1" fill="#e2e8f0" />
  <!-- Search -->
  <rect x="420" y="175" width="200" height="30" rx="15" fill="#f1f5f9" />
  <!-- Profile & Notification -->
  <circle cx="940" cy="190" r="15" fill="#e2e8f0" />
  <circle cx="890" cy="190" r="10" fill="#f1f5f9" />
  <circle cx="894" cy="184" r="4" fill="#ef4444" />

  <!-- Dashboard Main Content -->
  <rect x="420" y="240" width="150" height="20" rx="6" fill="#1e293b" />
  
  <!-- Status Cards (Pending, Progress, Resolved) -->
  <rect x="420" y="280" width="175" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <rect x="440" y="300" width="12" height="12" rx="4" fill="#eab308" />
  <rect x="460" y="302" width="60" height="8" rx="4" fill="#64748b" />
  <rect x="440" y="330" width="80" height="16" rx="6" fill="#1e293b" />
  
  <rect x="610" y="280" width="175" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <rect x="630" y="300" width="12" height="12" rx="4" fill="#3b82f6" />
  <rect x="650" y="302" width="70" height="8" rx="4" fill="#64748b" />
  <rect x="630" y="330" width="70" height="16" rx="6" fill="#1e293b" />

  <rect x="800" y="280" width="150" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <rect x="820" y="300" width="12" height="12" rx="4" fill="#22c55e" />
  <rect x="840" y="302" width="50" height="8" rx="4" fill="#64748b" />
  <rect x="820" y="330" width="90" height="16" rx="6" fill="#1e293b" />

  <!-- Analytics Section (Bar & Pie) -->
  <rect x="420" y="390" width="365" height="160" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <rect x="440" y="410" width="100" height="10" rx="5" fill="#64748b" />
  <!-- Bar chart -->
  <rect x="450" y="510" width="25" height="20" rx="4" fill="#dbeafe" />
  <rect x="490" y="470" width="25" height="60" rx="4" fill="#93c5fd" />
  <rect x="530" y="440" width="25" height="90" rx="4" fill="#3b82f6" />
  <rect x="570" y="490" width="25" height="40" rx="4" fill="#bfdbfe" />
  <rect x="610" y="420" width="25" height="110" rx="4" fill="#2563eb" />
  <rect x="650" y="460" width="25" height="70" rx="4" fill="#60a5fa" />
  
  <!-- Pie Chart -->
  <rect x="800" y="390" width="150" height="160" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <circle cx="875" cy="470" r="45" fill="none" stroke="#e2e8f0" stroke-width="18" />
  <circle cx="875" cy="470" r="45" fill="none" stroke="url(#pieGrad1)" stroke-width="18" stroke-dasharray="150 200" stroke-linecap="round" />
  <circle cx="875" cy="470" r="45" fill="none" stroke="#22c55e" stroke-width="18" stroke-dasharray="60 300" stroke-dashoffset="-160" stroke-linecap="round" />

  <!-- Complaint Table -->
  <rect x="420" y="570" width="530" height="80" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <rect x="440" y="590" width="120" height="8" rx="4" fill="#64748b" />
  <rect x="440" y="610" width="490" height="1" fill="#e2e8f0" />
  <rect x="440" y="625" width="20" height="12" rx="3" fill="#e2e8f0" />
  <rect x="470" y="627" width="100" height="8" rx="4" fill="#94a3b8" />
  <rect x="600" y="627" width="80" height="8" rx="4" fill="#94a3b8" />
  <rect x="870" y="625" width="60" height="12" rx="6" fill="#dcfce7" />
  <rect x="880" y="629" width="40" height="4" rx="2" fill="#16a34a" />

  <!-- AI Assistant Chat Widget (Floating on screen) -->
  <rect x="730" y="470" width="240" height="160" rx="16" fill="url(#cardGrad)" filter="url(#floatShadow)" stroke="#ffffff" stroke-width="2" />
  <rect x="730" y="470" width="240" height="45" fill="#2563eb" rx="16" />
  <!-- Fix top rounded corners for chat header -->
  <rect x="730" y="500" width="240" height="15" fill="#2563eb" />
  <circle cx="760" cy="492" r="12" fill="#ffffff" opacity="0.2" />
  <rect x="785" y="490" width="80" height="8" rx="4" fill="#ffffff" />
  <!-- Chat bubbles -->
  <rect x="750" y="535" width="140" height="28" rx="14" fill="#e2e8f0" />
  <rect x="765" y="545" width="100" height="8" rx="4" fill="#64748b" />
  
  <rect x="800" y="575" width="150" height="36" rx="14" fill="#2563eb" />
  <rect x="815" y="585" width="120" height="6" rx="3" fill="#ffffff" opacity="0.8" />
  <rect x="815" y="597" width="80" height="6" rx="3" fill="#ffffff" opacity="0.8" />

  <!-- Floating Elements Outside Laptop -->
  <g filter="url(#floatShadow)">
    <rect x="80" y="120" width="180" height="130" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <circle cx="125" cy="160" r="20" fill="#dbeafe" />
    <path d="M 115 160 L 122 167 L 135 152" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="125" y="195" width="80" height="12" rx="6" fill="#1e293b" />
    <rect x="125" y="215" width="110" height="8" rx="4" fill="#94a3b8" />
  </g>

  <g filter="url(#floatShadow)">
    <rect x="920" y="60" width="140" height="140" rx="20" fill="url(#bgGrad)" />
    <circle cx="990" cy="115" r="30" fill="#ffffff" opacity="0.2" />
    <rect x="960" y="160" width="60" height="8" rx="4" fill="#ffffff" />
    <rect x="970" y="175" width="40" height="6" rx="3" fill="#ffffff" opacity="0.6" />
  </g>
</svg>
